<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message</title>
    <script src="../static/js/script.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background: #000;
            color: #fff;
        }

        .grid-bg {
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
            background-size: 48px 48px;
        }

        .fade {
            animation: fade .7s ease-out;
        }

        @keyframes fade {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>

</head>

<body class="grid-bg min-h-screen flex items-center justify-center">

    <!-- ambient glow -->
    <div class="absolute w-[550px] h-[550px] bg-white/5 rounded-full blur-[150px]
            top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2"></div>

    <!-- Message Card -->
    <div class="relative max-w-md w-full px-8 text-center fade">

        <!-- Icon -->
        <div class="mx-auto w-12 h-12 rounded-full bg-white/5 border border-white/10
                flex items-center justify-center text-white/80">
            {{code}}
        </div>

        <!-- Title -->
        <h1 class="mt-6 text-xl font-light">
            {{title}}
        </h1>

        <!-- Message -->
        <p class="mt-4 text-sm text-neutral-500 leading-relaxed">
            {{message}}
        </p>

        <!-- Optional details box -->
        <div class="mt-8 text-left bg-white/5 border border-white/10 rounded-xl p-4 text-xs text-neutral-400">
            <div class="flex justify-between">
                <span>Status</span>
                <span class="text-white">200 OK</span>
            </div>
            <div class="flex justify-between mt-2">
                <span>Timestamp</span>
                <span>Just now</span>
            </div>
            <div class="flex justify-between mt-2">
                <span>Service</span>
                <span>FastAPI</span>
            </div>
        </div>

        <!-- Actions -->
        <div class="mt-10 flex flex-col gap-3">

            <a href="/" class="w-full py-3 rounded-xl bg-white text-black font-medium
                  hover:opacity-90 transition active:scale-[0.99]">
                Back to home
            </a>

            <a href="/docs" class="w-full py-3 rounded-xl border border-white/10 text-white
                  hover:bg-white/5 transition">
                View API docs
            </a>

        </div>

        <!-- Footer -->
        <p class="text-xs text-neutral-600 mt-10">
            System message delivered by FastAPI runtime
        </p>

    </div>

</body>

</html>
