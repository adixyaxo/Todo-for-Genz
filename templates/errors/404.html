<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — TaskFlow</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
    .hero-glow { position: fixed; width: 500px; height: 500px; background: radial-gradient(circle, rgba(0,112,243,0.08) 0%, transparent 70%); top: -100px; left: 50%; transform: translateX(-50%); pointer-events: none; }
  </style>
</head>
<body class="antialiased min-h-screen flex flex-col items-center justify-center text-center px-6">
  <div class="hero-glow"></div>
  <div class="relative z-10">
    <p class="text-7xl font-bold mb-4" style="color:rgba(255,255,255,0.07); font-variant-numeric: tabular-nums; letter-spacing: -0.05em">404</p>
    <h1 class="text-xl font-semibold text-white mb-3">Page not found</h1>
    <p class="text-sm text-gray-500 mb-8 max-w-xs">The page you're looking for doesn't exist or has been moved.</p>
    <div class="flex gap-3 justify-center">
      <a href="/" class="bg-white text-black font-medium px-6 py-2.5 rounded-md text-sm hover:bg-gray-100 transition-colors">Go home</a>
      <button onclick="history.back()" class="border border-white/15 text-gray-400 hover:text-white px-6 py-2.5 rounded-md text-sm transition-colors">Go back</button>
    </div>
  </div>
</body>
</html>
