<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — TaskFlow</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../static/js/script.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter','sans-serif'] } } } };
  </script>
  <style>
    body { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
    .sidebar { background: #080808; border-right: 1px solid rgba(255,255,255,0.06); }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px; border-radius: 8px; font-size: 0.875rem; color: #777;
      transition: color 0.15s, background 0.15s; cursor: pointer; text-decoration: none;
    }
    .nav-item:hover { color: #fff; background: rgba(255,255,255,0.04); }
    .nav-item.active { color: #fff; background: rgba(255,255,255,0.06); }
    .card {
      background: #0a0a0a; border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px; transition: border-color 0.15s;
    }
    .card:hover { border-color: rgba(255,255,255,0.12); }
    .stat-card { background: #0a0a0a; border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; padding: 20px; }
    .task-item {
      display: flex; align-items: start; gap: 12px; padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .task-item:last-child { border-bottom: none; }
    .checkbox {
      width: 16px; height: 16px; border-radius: 4px;
      border: 1.5px solid rgba(255,255,255,0.2); flex-shrink: 0; margin-top: 2px;
      cursor: pointer; transition: border-color 0.15s, background 0.15s;
      display: flex; align-items: center; justify-content: center;
    }
    .checkbox:hover { border-color: #0070f3; }
    .checkbox.checked { background: #0070f3; border-color: #0070f3; }
    .badge-priority {
      font-size: 0.65rem; padding: 2px 8px; border-radius: 999px; font-weight: 500;
    }
    .badge-high { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.2); }
    .badge-medium { background: rgba(234,179,8,0.15); color: #fbbf24; border: 1px solid rgba(234,179,8,0.2); }
    .badge-low { background: rgba(34,197,94,0.1); color: #4ade80; border: 1px solid rgba(34,197,94,0.2); }
    .quick-input {
      background: #0a0a0a; border: 1px solid rgba(255,255,255,0.1); color: #fff;
      width: 100%; padding: 10px 14px; border-radius: 8px; font-size: 0.875rem; outline: none;
      transition: border-color 0.15s;
    }
    .quick-input:focus { border-color: #0070f3; }
    .quick-input::placeholder { color: #444; }
    .btn-sm {
      background: #fff; color: #000; font-size: 0.75rem; font-weight: 500;
      padding: 6px 14px; border-radius: 6px; transition: background 0.15s; cursor: pointer;
    }
    .btn-sm:hover { background: #e8e8e8; }
    .topbar { background: rgba(0,0,0,0.85); border-bottom: 1px solid rgba(255,255,255,0.06); backdrop-filter: blur(12px); }
    .avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: linear-gradient(135deg, #0070f3, #00c6ff);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: 600; color: #fff; flex-shrink: 0;
    }
    .note-card {
      background: #0a0a0a; border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px; padding: 16px; transition: border-color 0.15s;
    }
    .note-card:hover { border-color: rgba(255,255,255,0.15); }
    .section-label { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #444; }
    .sidebar-section { padding: 8px 12px; }
    .loading { color: #444; font-size: 0.875rem; padding: 20px 0; text-align: center; }
  </style>
</head>
<body class="antialiased">

  <div class="flex h-screen overflow-hidden">
    <!-- SIDEBAR -->
    <aside class="sidebar w-56 flex flex-col flex-shrink-0 hidden md:flex">
      <div class="p-4 border-b border-white/5">
        <a href="/" class="flex items-center gap-2 font-semibold text-white text-sm">
          <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><rect width="20" height="20" rx="4" fill="#0070f3"/><path d="M5 10h10M5 7h6M5 13h8" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>
          TaskFlow
        </a>
      </div>

      <nav class="flex-1 p-3 space-y-1 overflow-y-auto">
        <a href="/dashboard" class="nav-item active">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity=".5"/><rect x="9" y="1" width="6" height="6" rx="1.5" fill="currentColor"/><rect x="1" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity=".5"/><rect x="9" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity=".5"/></svg>
          Overview
        </a>
        <a href="/tasks" class="nav-item">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 4h12M2 8h8M2 12h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          Tasks
        </a>
        <a href="/notes" class="nav-item">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M5 6h6M5 9h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          Notes
        </a>

        <div class="pt-4">
          <p class="section-label sidebar-section mb-1">Account</p>
          <a href="/profile" class="nav-item">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M2 13c0-2.2 2.7-4 6-4s6 1.8 6 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            Profile
          </a>
          <a href="/settings" class="nav-item">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.5"/><path d="M8 1.5v1M8 13.5v1M1.5 8h1M13.5 8h1M3.3 3.3l.7.7M11.3 11.3l.7.7M11.3 3.3l-.7.7M4 12l-.7.7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            Settings
          </a>
        </div>
      </nav>

      <div class="p-3 border-t border-white/5">
        <button onclick="logout()" class="nav-item w-full text-left text-red-400 hover:text-red-300 hover:bg-red-950/30">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 2H3a1 1 0 00-1 1v10a1 1 0 001 1h3M10 11l3-3-3-3M13 8H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          Log out
        </button>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <div class="flex-1 flex flex-col overflow-hidden">
      <!-- TOPBAR -->
      <header class="topbar h-14 flex items-center justify-between px-6 flex-shrink-0">
        <div class="flex items-center gap-3">
          <h1 class="text-sm font-semibold text-white">Overview</h1>
        </div>
        <div class="flex items-center gap-3">
          <div class="hidden md:flex items-center gap-2 text-xs text-gray-500">
            <span id="current-date"></span>
          </div>
          <div class="flex items-center gap-2">
            <div class="avatar" id="user-avatar">AD</div>
            <span class="text-sm text-gray-300 hidden md:block" id="user-name">Loading...</span>
          </div>
        </div>
      </header>

      <!-- SCROLL AREA -->
      <main class="flex-1 overflow-y-auto p-6">
        <div class="max-w-5xl mx-auto space-y-8">

          <!-- GREETING + STATS -->
          <div>
            <h2 class="text-xl font-semibold text-white mb-1" id="greeting">Good morning</h2>
            <p class="text-sm text-gray-500">Here's where things stand.</p>
          </div>

          <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
            <div class="stat-card">
              <div class="text-2xl font-bold text-white mb-1" id="stat-total">—</div>
              <div class="text-xs text-gray-500">Total tasks</div>
            </div>
            <div class="stat-card">
              <div class="text-2xl font-bold text-green-400 mb-1" id="stat-done">—</div>
              <div class="text-xs text-gray-500">Completed</div>
            </div>
            <div class="stat-card">
              <div class="text-2xl font-bold text-yellow-400 mb-1" id="stat-pending">—</div>
              <div class="text-xs text-gray-500">In progress</div>
            </div>
            <div class="stat-card">
              <div class="text-2xl font-bold text-blue-400 mb-1" id="stat-notes">—</div>
              <div class="text-xs text-gray-500">Notes</div>
            </div>
          </div>

          <!-- QUICK ADD + RECENT TASKS -->
          <div class="card p-5">
            <div class="flex items-center justify-between mb-4">
              <h3 class="text-sm font-semibold text-white">Recent tasks</h3>
              <a href="/tasks" class="text-xs text-gray-500 hover:text-white transition-colors">View all →</a>
            </div>

            <!-- Quick add -->
            <div class="flex gap-2 mb-5">
              <input type="text" id="quick-task" placeholder="New task... (press Enter)" class="quick-input" />
              <button onclick="quickAddTask()" class="btn-sm flex-shrink-0">Add</button>
            </div>

            <div id="task-list">
              <div class="loading">Loading tasks...</div>
            </div>
          </div>

          <!-- RECENT NOTES -->
          <div>
            <div class="flex items-center justify-between mb-4">
              <h3 class="text-sm font-semibold text-white">Recent notes</h3>
              <a href="/notes" class="text-xs text-gray-500 hover:text-white transition-colors">View all →</a>
            </div>
            <div id="notes-grid" class="grid grid-cols-1 md:grid-cols-2 gap-3">
              <div class="loading col-span-2">Loading notes...</div>
            </div>
          </div>

        </div>
      </main>
    </div>
  </div>
</body>
</html>
