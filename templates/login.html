<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in — TaskFlow</title>
  <script src="/static/js/script.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/css/style.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { 
            sans: ['Inter', 'sans-serif'],
            mono: ['Space Mono', 'monospace']
          },
          colors: {
            'effortel-dark-bg': '#0F1317',
            'effortel-dark-surface': '#1B2026',
            'effortel-light-bg': '#D1DCE2',
            'effortel-light-surface': '#A9BAC4',
            'effortel-accent': '#2ED2E5',
            'effortel-accent-hover': '#1BB8C8',
          },
        },
      },
    };
  </script>
</head>
<body class="antialiased min-h-screen flex flex-col bg-effortel-dark-bg text-white selection:bg-effortel-accent selection:text-black">
  <!-- Glowing blob for background -->
  <div class="fixed w-[600px] h-[600px] bg-effortel-accent/10 rounded-full blur-[120px] top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-none"></div>

  <!-- NAV -->
  <nav class="fixed top-0 left-0 right-0 z-50 glass-panel border-b-0 px-6 py-4 flex items-center justify-between">
    <a href="/" class="flex items-center gap-2 font-bold text-white text-sm">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect width="20" height="20" rx="4" fill="#2ED2E5"/><path d="M5 10h10M5 7h6M5 13h8" stroke="#0F1317" stroke-width="1.5" stroke-linecap="round"/></svg>
      TaskFlow
    </a>
    <a href="/signup" class="mono-tag text-gray-400 hover:text-white transition-colors flex items-center gap-1">
      SIGN UP <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="m9 18 6-6-6-6"/></svg>
    </a>
  </nav>

  <!-- MAIN -->
  <main class="flex-1 flex items-center justify-center px-6 pt-20 pb-10 relative z-10">
    <div class="w-full max-w-sm anim-float" style="animation-duration: 8s;">
      
      <div class="text-center mb-10">
        <div class="w-16 h-16 rounded-3xl bg-effortel-accent/10 border border-effortel-accent/20 flex items-center justify-center mx-auto mb-6">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--effortel-accent)" stroke-width="2" stroke-linecap="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg>
        </div>
        <h1 class="text-3xl font-bold tracking-tight mb-2">Welcome Back</h1>
        <p class="text-sm text-gray-400 mono-tag">[ SECURE LOGIN ]</p>
      </div>

      <!-- Flash messages from backend -->
      <div id="flash-container" class="mb-4"></div>

      <div class="glass-panel p-8 rounded-3xl shadow-2xl">
        <form action="/auth" method="get" id="login-form" class="space-y-6" novalidate>
          <div>
            <label class="block text-[10px] text-gray-400 mb-2 mono-tag">EMAIL ADDRESS</label>
            <input type="email" id="email" name="email" placeholder="hello@effortel.com" class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-sm outline-none focus:border-effortel-accent/50 focus:bg-white/5 transition-all" autocomplete="email" required />
          </div>
          <div>
            <div class="flex items-center justify-between mb-2">
              <label class="block text-[10px] text-gray-400 mono-tag">PASSWORD</label>
              <a href="/forgot-password" class="text-xs text-effortel-accent hover:text-white transition-colors">Forgot?</a>
            </div>
            <input type="password" id="password" name="password" placeholder="••••••••" class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-sm outline-none focus:border-effortel-accent/50 focus:bg-white/5 transition-all" autocomplete="current-password" required />
          </div>

          <div id="login-error" class="hidden bg-red-500/10 border border-red-500/20 text-red-400 text-xs p-3 rounded-xl"></div>

          <button type="submit" class="btn-effortel btn-pill bg-effortel-accent text-effortel-dark-bg font-bold text-sm w-full py-4 mt-2" id="submit-btn">
            ACCESS ACCOUNT
          </button>
        </form>

        <div class="flex items-center gap-4 my-8">
          <div class="h-px bg-white/10 flex-1"></div>
          <span class="mono-tag text-[10px] text-gray-500">OR</span>
          <div class="h-px bg-white/10 flex-1"></div>
        </div>

        <p class="text-center text-sm text-gray-400">
          New to TaskFlow?
          <a href="/signup" class="text-white hover:text-effortel-accent font-medium ml-1 transition-colors">Create account</a>
        </p>
      </div>
      
    </div>
  </main>
</body>
</html>
